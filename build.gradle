plugins {
    id 'java'
}

allprojects {
    repositories {
        mavenCentral()
    }

    buildscript {
        repositories {
            mavenCentral()
            gradlePluginPortal()
        }
        dependencies {
            classpath 'org.springframework.boot:spring-boot-gradle-plugin:2.7.18'
        }
    }
}

subprojects {
    apply plugin: 'java'

    group = 'com.trading'
    version = '1.0.0'
    sourceCompatibility = '21'
    targetCompatibility = '21'

    repositories {
        mavenCentral()
    }
}
